<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.2em;
        }
        
        .progress-container {
            max-width: 800px;
            margin: 0 auto 40px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #333;
        }
        
        .progress-bar {
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.5s;
        }
        
        .cards-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        
        .card-3d {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            transform-style: preserve-3d;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
            50% { transform: translateY(-10px) rotateX(5deg) rotateY(5deg); }
        }
        
        .card-3d::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            transform: rotateX(90deg) translateZ(-20px);
            filter: blur(10px);
        }
        
        .card-icon {
            font-size: 4em;
            text-align: center;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }
        
        .card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }
        
        .card p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .expiry {
            font-size: 0.9em;
            padding: 8px 12px;
            border-radius: 10px;
            background: #f8f9fa;
            margin: 15px 0;
        }
        
        .expiry.good { color: #27ae60; }
        .expiry.warning { color: #f39c12; }
        .expiry.bad { color: #e74c3c; }
        
        .check-btn {
            width: 100%;
            padding: 12px;


border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .check-btn:hover {
            transform: scale(1.05);
        }
        
        .check-btn.checked {
            background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            position: relative;
            animation: modalPop 0.5s;
        }
        
        @keyframes modalPop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
        }
        
        .medicine-3d {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border-radius: 50%;
            animation: spin 10s linear infinite;
            position: relative;
        }
        
        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <h1>🏥 Проверь свою аптечку</h1>
    <div class="subtitle">Отметь, что у тебя есть, и узнай, чего не хватает</div>
    
    <div class="progress-container">
        <div class="progress-header">
            <span>Готовность аптечки</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    
    <div class="cards-grid" id="cardsGrid"></div>
    
    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div class="medicine-3d" id="modal3d"></div>
            <p id="modalDesc"></p>
            <p id="modalExpiry"></p>
            <button class="check-btn" onclick="toggleModalItem()" id="modalBtn">Отметить как есть</button>
        </div>
    </div>
    
    <script>
        const items = [
            {
                name: "Бинты стерильные",
                icon: "📦",
                desc: "Разные размеры, минимум 3 упаковки",
                expiry: "good",
                expiryText: "Годны до 2026"
            },
            {
                name: "Пластырь бактерицидный",
                icon: "🩹",
                desc: "Разных размеров, 10+ штук",
                expiry: "warning",
                expiryText: "Проверь срок через 3 месяца"
            },
            {
                name: "Антисептик",
                icon: "🧴",
                desc: "Хлоргексидин или перекись",
                expiry: "good",
                expiryText: "Годен до 2025"
            },
            {
                name: "Жгут кровоостанавливающий",
                icon: "🔄",
                desc: "Для остановки сильного кровотечения",
                expiry: "good",
                expiryText: "Не имеет срока годности"
            },
            {
                name: "Перчатки медицинские",
icon: "🧤",
                desc: "Несколько пар, разные размеры",
                expiry: "bad",
                expiryText: "Просрочены, замени!"
            },
            {
                name: "Ножницы",
                icon: "✂️",
                desc: "Для разрезания одежды",
                expiry: "good",
                expiryText: "Всегда готовы"
            },
            {
                name: "Обезболивающие",
                icon: "💊",
                desc: "Ибупрофен, парацетамол",
                expiry: "warning",
                expiryText: "Годны до 06.2024"
            },
            {
                name: "Термометр",
                icon: "🌡️",
                desc: "Электронный или ртутный",
                expiry: "good",
                expiryText: "Работает"
            }
        ];
        
        let checkedItems = new Array(items.length).fill(false);
        let currentItem = null;
        
        // Отрисовка карточек
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(index);
                
                card.innerHTML = 
                    <div class="card-3d">
                        <div class="card-icon">${item.icon}</div>
                    </div>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <div class="expiry ${item.expiry}">${item.expiryText}</div>
                    <button class="check-btn ${checkedItems[index] ? 'checked' : ''}" onclick="event.stopPropagation(); toggleItem(${index})">
                        ${checkedItems[index] ? '✓ Есть в аптечке' : 'Отметить как есть'}
                    </button>
                ;
                
                grid.appendChild(card);
            });
        }
        
        function toggleItem(index) {
            checkedItems[index] = !checkedItems[index];
            updateProgress();
            renderCards();
        }
        
        function updateProgress() {
            const checked = checkedItems.filter(v => v).length;
            const percent = Math.round((checked / items.length) * 100);
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
        }
        
        function openModal(index) {
            currentItem = index;
            const item = items[index];
            
            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modal3d').innerHTML = item.icon;
            document.getElementById('modalDesc').textContent = item.desc;
            document.getElementById('modalExpiry').textContent = item.expiryText;
            document.getElementById('modalBtn').textContent = checkedItems[index] ? '✓ Уже есть' : 'Отметить как есть';
            
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        function toggleModalItem() {
            if (currentItem !== null) {
                toggleItem(currentItem);
                closeModal();
            }
        }
        
        // Инициализация
        renderCards();
    </script>
</body>
</html>
